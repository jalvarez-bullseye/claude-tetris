name: Claude Issue Overview

on:
  issues:
    types: [opened]

jobs:
  overview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Post solution overview
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Fuerza el modo "tag" con un comentario de seguimiento, aunque
          # no se mencione a @claude, para que el overview se publique
          # automáticamente como comentario en el issue.
          track_progress: true

          prompt: |
            Se acaba de abrir el issue #${{ github.event.issue.number }}: "${{ github.event.issue.title }}".

            Lee el issue y el código relevante del repositorio, y publica un comentario
            en español con:
            1. Un resumen breve del problema o petición.
            2. Un overview de una posible solución: qué archivos/funciones se verían
               afectados, los pasos clave, y cualquier riesgo o duda abierta.

            Sé conciso: es un overview de alto nivel, no una implementación completa.
